      { q: 'Part 4 — Fill in: "She is the ______ person in our class to solve the puzzle." (luck)', opts: ['luckier','luckyest','luckiest','luckness'], ans: 2, hint: 'Change the y to an i and choose the highest tier comparison.' },
      { q: 'Part 5 — Story: "It was a ______ day, perfect for working outside."', opts: ['teacher','beautiful','sunny','hopeless'], ans: 2, hint: 'Think about a bright sky full of light.' },
      { q: 'Part 5 — Story: "Our ______, Ms. Chen, asked us to be careful with the new plants."', opts: ['scientist','teacher','artist','runner'], ans: 1, hint: 'Who leads the children in the school garden?' },
      { q: 'Part 5 — Story: "The sunflower was ______ than the rose bush."', opts: ['biggest','bigger','most big','bigest'], ans: 1, hint: 'Compare the size of the sunflower to the single rose bush.' },
      { q: 'Part 5 — Story: "It was also the ______ plant in the garden." (tallest)', opts: ['taller','tallmore','tallest','tallist'], ans: 2, hint: 'It beats every single other plant in height.' },
      { q: 'Part 5 — Story: "At first, planting seemed ______ because it was so much work."', opts: ['helpful','careful','wonderful','hopeless'], ans: 3, hint: 'The kids felt like there was no hope of finishing the hard work.' },
    ]
  }
];

// ===== STATE =====
let state = {
  screen: 'menu',
  sectionIdx: null,
  questions: [],
  qIdx: 0,
  points: 0,
  correct: 0,
  wrong: 0,
  selected: null,
  hintUsed: false,
  hintShown: false,
  answered: false,
  hintPending: false,
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions(section) {
  const qs = shuffle([...section.questions]);
  return qs.map(q => {
    const opts = q.opts.map((o, i) => ({ text: o, isAns: i === q.ans }));
    const shuffled = shuffle(opts);
    return { ...q, shuffledOpts: shuffled };
  });
}

// ===== RENDER =====
const app = document.getElementById('app');

function render() {
  if (state.screen === 'menu') renderMenu();
  else if (state.screen === 'quiz') renderQuiz();
  else if (state.screen === 'end') renderEnd();
}

function renderMenu() {
  app.innerHTML = `
    <div class="brand">Agarutan Print</div>
    <div class="quiz-title">What Are Suffixes?</div>
    <div class="quiz-subtitle">Build Vocabulary &amp; Word Forms</div>
    ${SECTIONS.map((s, i) => `
      <button class="section-btn ${s.btnClass}" onclick="startSection(${i})">
        ${i === SECTIONS.length - 1 ? '🏆 ' : ''}${s.title}
        <span style="font-size:0.78rem;font-weight:400;display:block;color:inherit;opacity:0.8;">${s.subtitle}</span>
      </button>
    `).join('')}
  `;
}

function startSection(i) {
  state.sectionIdx = i;
  state.questions = prepareQuestions(SECTIONS[i]);
  state.qIdx = 0;
  state.points = 0;
  state.correct = 0;
  state.wrong = 0;
  state.screen = 'quiz';
  state.selected = null;
  state.hintUsed = false;
  state.hintShown = false;
  state.answered = false;
  render();
}

function renderQuiz() {
  const section = SECTIONS[state.sectionIdx];
  const q = state.questions[state.qIdx];
  const total = state.questions.length;
  const pct = total > 0 ? Math.round((state.correct / Math.max(1, state.correct + state.wrong)) * 100) : 0;
  const progPct = Math.round(((state.qIdx + 1) / total) * 100);

  app.innerHTML = `
    <div class="section-header">${section.title}</div>
    <div class="question-counter">Question ${state.qIdx + 1} of ${total}</div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${progPct}%"></div></div>
    <div class="stats-row">
      <div class="stat-pill pill-pts">⭐ ${state.points} pts</div>
      <div class="stat-pill pill-cor">✅ ${state.correct}</div>
      <div class="stat-pill pill-wrg">❌ ${state.wrong}</div>
      <div class="stat-pill pill-pct">🎯 ${state.correct + state.wrong > 0 ? pct : '—'}%</div>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="options" id="opts">
      ${q.shuffledOpts.map((o, i) => `
        <button class="opt-btn" id="opt${i}" onclick="selectOpt(${i})" ${state.answered ? 'disabled' : ''}>${o.text}</button>
      `).join('')}
    </div>
    ${!state.answered ? `
      <button class="hint-btn" onclick="showHint()" ${state.hintShown ? 'disabled style="opacity:0.5"' : ''}>💡 Show Hint (-5 pts if used)</button>
      ${state.hintShown ? `<div class="hint-box">💡 ${q.hint}</div>` : ''}
    ` : `<div class="feedback ${state.lastCorrect ? 'correct' : 'wrong'}" id="feedback">
        ${state.lastCorrect ? '✅ Correct! +' + (state.hintUsed ? '5' : '10') + ' points' : '❌ Not quite! The correct answer is highlighted.'}
      </div>
      <button class="next-btn" onclick="nextQuestion()">${state.qIdx + 1 < total ? 'Next Question ➜' : 'See Results 🎉'}</button>
    `}
    <button class="exit-btn" onclick="goMenu()">✕ Exit to Menu</button>
  `;

  if (state.answered) {
    q.shuffledOpts.forEach((o, i) => {
      const btn = document.getElementById('opt' + i);
      if (o.isAns) btn.classList.add('correct');
      else if (i === state.selected && !o.isAns) btn.classList.add('wrong');
    });
  }
}

function selectOpt(i) {
  if (state.answered) return;
  state.answered = true;
  state.selected = i;
  const q = state.questions[state.qIdx];
  const correct = q.shuffledOpts[i].isAns;
  state.lastCorrect = correct;
  if (correct) {
    const pts = state.hintUsed ? 5 : 10;
    state.points += pts;
    state.correct++;
  } else {
    state.wrong++;
  }
  state.hintUsed = false;
  render();
}

function showHint() {
  if (state.hintShown) return;
  state.hintShown = true;
  state.hintUsed = true;
  render();
}

function nextQuestion() {
  state.qIdx++;
  const section = SECTIONS[state.sectionIdx];
  if (state.qIdx >= state.questions.length) {
    state.screen = 'end';
  }
  state.selected = null;
  state.hintUsed = false;
  state.hintShown = false;
  state.answered = false;
  render();
}

function goMenu() {
  state.screen = 'menu';
  render();
}

function renderEnd() {
  const total = state.questions.length;
  const maxPts = total * 10;
  const pct = Math.round((state.correct / total) * 100);
  const pass = pct >= 70;
  const isMastery = state.sectionIdx === SECTIONS.length - 1;

  let title = '';
  if (pct === 100) title = '🏆 Spectacular!';
  else if (pct >= 85) title = '⭐ Excellent!';
  else if (pct >= 70) title = '🌟 Great Job!';

  const starsHtml = pass ? [0,1,2,3,4].map(i =>
    `<span class="star" style="animation-delay:${i*0.15}s">⭐</span>`
  ).join('') : '';

  const reviewBox = (isMastery && pass && SRC) ? buildReviewBox() : '';

  app.innerHTML = `
    <div class="end-screen">
      ${pass ? `
        <div class="trophy">🏆</div>
        <div class="stars-row">${starsHtml}</div>
        <div class="end-title">${title}</div>
        <div class="end-subtitle">You scored ${pct}% on ${SECTIONS[state.sectionIdx].title}!</div>
      ` : `
        <div class="encourage-icon">💪</div>
        <div class="end-title">Keep Going!</div>
        <div class="end-subtitle">You scored ${pct}%. Practice makes perfect — try again!</div>
      `}
      <div class="end-stats">
        <div class="end-pill pill-pts">⭐ ${state.points} pts</div>
        <div class="end-pill pill-cor">✅ ${state.correct}</div>
        <div class="end-pill pill-wrg">❌ ${state.wrong}</div>
        <div class="end-pill pill-pct">🎯 ${pct}%</div>
      </div>
      <button class="action-btn btn-try" onclick="startSection(${state.sectionIdx})">🔄 Try Again</button>
      <button class="action-btn btn-menu" onclick="goMenu()">🏠 Back to Menu</button>
      ${reviewBox}
    </div>
  `;
}

function buildReviewBox() {
  let buttons = '';
  if (SRC === 'etsy') {
    buttons = `<a class="review-link-btn" href="https://www.etsy.com/your/purchases" target="_blank">⭐ Leave a Review on Etsy</a>`;
  } else if (SRC === 'amazon') {
    buttons = `
      <a class="review-link-btn" href="https://www.amazon.com/review/create-review?asin=${PAPERBACK_ASIN}" target="_blank">📗 Review Paperback on Amazon</a>
      <a class="review-link-btn" href="https://www.amazon.com/review/create-review?asin=${HARDCOVER_ASIN}" target="_blank">📘 Review Hardcover on Amazon</a>
    `;
  }
  return `
    <div class="review-box">
      <h3>🔒 Notice: For Parents &amp; Educators</h3>
      <div class="rq">How did you like this complete resource bundle?</div>
      <p>Thank you for choosing Agarutan Print! We hope this combination of printable worksheets, the digital fillable PDF, and the interactive quiz bonus is helping to build your student's skills.</p>
      <p>If this comprehensive resource bundle added value to your student's learning experience, please take a brief moment to share your feedback. Your review helps us continue creating high-quality learning assets!</p>
      ${buttons}
    </div>
  `;
}

// Init
render();
</script>
</body>
</html>
